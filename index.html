<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The French Revolution — American Style</title>

<style>
  body {
    margin: 0;
    background-color: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* HUB SCREEN (start screen) */
  #hubScreen {
    position: absolute;
    inset: 0;
    background-color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .thumb {
    height: 200px;
    border: 2px solid white;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .thumb:hover {
    transform: scale(1.1);
  }

  .titleText {
    color: white;
    margin-top: 15px;
    font-size: 22px;
    text-align: center;
  }

  /* VIEWER SCREEN (hidden until thumbnail clicked) */
  #viewerScreen {
    display: none;
    width: 100%;
    height: 100%;
  }

  img {
    max-width: 100%;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  /* Speed slider container (BOTTOM RIGHT) */
  #speedControl {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: white;
    z-index: 99999;
    background: black;
    padding: 8px 12px;
    border-radius: 6px;
    width: auto;
    text-align: center;
  }

  #speedControl input[type=range] {
    width: 120px;
  }

  /* Navigation arrows */
  .navButton {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 100px;
    color: white;
    cursor: pointer;
    z-index: 999999;
    user-select: none;
    opacity: 0.7;
    padding: 40px;
  }

  .navButton:hover {
    opacity: 1;
  }

  #leftBtn { left: 10%; }
  #rightBtn { right: 10%; }
</style>
</head>

<body>

<!-- ========================= -->
<!--       HUB SCREEN          -->
<!-- ========================= -->
<div id="hubScreen">
  <img src="comicbook2/cover page.png" class="thumb" onclick="startComic()">
  <div class="titleText">The French Revolution — American Style</div>
</div>

<!-- ========================= -->
<!--      VIEWER SCREEN        -->
<!-- ========================= -->
<div id="viewerScreen">

  <!-- Audio Player -->
  <audio controls loop style="position:fixed; top:20px; left:20px; z-index:999999; background:black; padding:5px; border-radius:5px;">
    <source src="comicbook2/Smoke on the Horizon.mp3" type="audio/mpeg">
  </audio>

  <!-- Navigation Buttons -->
  <div id="leftBtn" class="navButton">&#9664;</div>
  <div id="rightBtn" class="navButton">&#9654;</div>

  <!-- Comic Page -->
  <img id="comic" src="" alt="Comic Page">

  <!-- Speed Slider -->
  <div id="speedControl">
    <input type="range" id="speedSlider" min="2000" max="15000" value="6000" step="500">
    <div>Flip Speed</div>
  </div>

</div>

<script>
/* ========================= */
/*     SWITCH TO VIEWER      */
/* ========================= */
function startComic() {
  document.getElementById("hubScreen").style.display = "none";
  document.getElementById("viewerScreen").style.display = "block";
  showPage();
  startTimer();
}

/* ========================= */
/*     COMIC VIEWER LOGIC    */
/* ========================= */

var page = 0;

var pages = [
  "cover page.png",
  "page 2.png",
  "page 3.png",
  "page 4.png",
  "page 5.png",
  "page 6.png",
  "page 7.png",
  "page 8.png",
  "chapter2.png",
  "luke.png",
  "mason.png"
];

var flipSpeed = 6000;
var timer = null;
var autoFlipPaused = false;

function showPage() {
  document.getElementById("comic").src = "comicbook2/" + pages[page];
}

function nextPage() {
  page = (page + 1) % pages.length;
  showPage();
}

function prevPage() {
  page = (page - 1 + pages.length) % pages.length;
  showPage();
}

function startTimer() {
  if (timer !== null) clearInterval(timer);

  timer = setInterval(function() {
    if (!autoFlipPaused) nextPage();
  }, flipSpeed);
}

/* Slider logic */
var slider = document.getElementById("speedSlider");
slider.addEventListener("input", function() {
  flipSpeed = parseInt(this.value, 10);

  if (flipSpeed === 15000) {
    autoFlipPaused = true;
    clearInterval(timer);
    return;
  }

  autoFlipPaused = false;
  startTimer();
});

/* Navigation buttons */
document.getElementById("leftBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  prevPage();
  resumeAutoFlip();
});

document.getElementById("rightBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  nextPage();
  resumeAutoFlip();
});

/* Resume auto-flip after 5 seconds unless slider is maxed */
function resumeAutoFlip() {
  setTimeout(function() {
    if (flipSpeed < 15000) autoFlipPaused = false;
  }, 5000);
}
</script>

</body>
</html>
