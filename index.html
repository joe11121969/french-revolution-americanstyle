<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Episode 1 – Comic</title>

<style>
  body {
    margin: 0;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  img {
    max-width: 100%;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  #speedControl {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
  }

  input[type=range] {
    width: 60%;
  }
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="comicbook2/Smoke on the Horizon.mp3" type="audio/mpeg">
</audio>

<!-- Comic Page -->
<img id="comic" src="" alt="Comic Page">

<!-- Speed Slider -->
<div id="speedControl">
  <input type="range" id="speedSlider" min="2000" max="15000" value="6000" step="500">
  <div>Flip Speed</div>
</div>

<script>
// use old-style 'var' everywhere for maximum compatibility
var page = 0;

// EXACT filenames from your folder
var pages = [
  "cover page.png",
  "page 2.png",
  "page 3.png",
  "page 4.png",
  "page 5.png",
  "page 6.png",
  "page 7.png",
  "page 8.png"
];

var flipSpeed = 6000; // default 6 seconds
var timer = null;

function showPage() {
  var img = document.getElementById("comic");
  img.src = "comicbook2/" + pages[page];
}

function nextPage() {
  page = (page + 1) % pages.length;
  showPage();
}

function startTimer() {
  if (timer !== null) {
    clearInterval(timer);
  }
  timer = setInterval(nextPage, flipSpeed);
}

// start
showPage();
startTimer();

// Slider to adjust speed
var slider = document.getElementById("speedSlider");
slider.addEventListener("input", function() {
  flipSpeed = parseInt(this.value, 10);
  startTimer();
});
</script>

</body>
</html>
