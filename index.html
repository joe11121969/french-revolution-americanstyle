<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The French Revolution — American Style</title>

<style>
  body {
    margin: 0;
    background-color: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* HUB SCREEN */
  #hubScreen {
    position: absolute;
    inset: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .thumb {
    height: 200px;
    border: 2px solid white;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .thumb:hover {
    transform: scale(1.1);
  }

  /* VIEWER SCREEN */
  #viewerScreen {
    display: none;
    width: 100%;
    height: 100%;
  }

  img {
    max-width: 100%;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  /* Speed slider */
  #speedControl {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: white;
    z-index: 99999;
    background: black;
    padding: 8px 12px;
    border-radius: 6px;
    width: auto;
    text-align: center;
  }

  #speedControl input[type=range] {
    width: 120px;
  }

  /* Navigation arrows */
  .navButton {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 100px;
    color: white;
    cursor: pointer;
    z-index: 999999;
    user-select: none;
    opacity: 0.7;
    padding: 40px;
  }

  .navButton:hover {
    opacity: 1;
  }

  #leftBtn { left: 10%; }
  #rightBtn { right: 10%; }

  /* Back to Home button */
  .homeButton {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 60px;
    color: white;
    cursor: pointer;
    z-index: 999999;
    user-select: none;
    opacity: 0.7;
    padding: 20px;
  }

  .homeButton:hover {
    opacity: 1;
  }
</style>
</head>

<body>

<!-- HUB SCREEN -->
<div id="hubScreen">
  <img src="comicbook2/cover page.png" class="thumb" onclick="startComic()">
</div>

<!-- VIEWER SCREEN -->
<div id="viewerScreen">

  <!-- Back to Home -->
  <div id="homeBtn" class="homeButton">&#8592;</div>

  <!-- Audio Player -->
  <audio id="bgMusic" controls loop
         style="position:fixed; top:20px; left:20px; z-index:999999; background:black; padding:5px; border-radius:5px;">
    <source id="musicSource" src="comicbook2/Smoke on the Horizon.mp3" type="audio/mpeg">
  </audio>

  <!-- Navigation -->
  <div id="leftBtn" class="navButton">&#9664;</div>
  <div id="rightBtn" class="navButton">&#9654;</div>

  <!-- Comic Page -->
  <img id="comic" src="" alt="Comic Page">

  <!-- Speed Slider -->
  <div id="speedControl">
    <input type="range" id="speedSlider" min="2000" max="15000" value="6000" step="500">
    <div>Flip Speed</div>
  </div>

</div>

<script>
/* ========================= */
/*     PAGE + CHAPTER DATA   */
/* ========================= */

var page = 0;

var pages = [
  "cover page.png", // 0
  "page 2.png",     // 1
  "page 3.png",     // 2
  "page 4.png",     // 3
  "page 5.png",     // 4
  "page 6.png",     // 5
  "page 7.png",     // 6
  "page 8.png",     // 7  <-- end of Chapter 1
  "chapter2.png",   // 8  <-- Chapter 2 starts
  "luke.png",       // 9
  "mason.png"       // 10
];

var chapter2StartIndex = 8;

var chapter1Music = "comicbook2/Smoke on the Horizon.mp3";
var chapter2Music = "comicbook2/capter2music.mp3";

var audioElement = document.getElementById("bgMusic");
var musicSource = document.getElementById("musicSource");
var currentMusic = chapter1Music;

/* ========================= */
/*     MUSIC SWITCH LOGIC    */
/* ========================= */

function updateMusicForPage() {
  var desiredMusic = (page >= chapter2StartIndex) ? chapter2Music : chapter1Music;

  if (desiredMusic !== currentMusic) {
    currentMusic = desiredMusic;

    // Force browser to reload the file
    musicSource.src = currentMusic + "?v=" + Date.now();

    audioElement.pause();
    audioElement.load();

    audioElement.play().catch(function(e){
      console.log("Autoplay blocked until user interacts.");
    });
  }
}

/* ========================= */
/*     SWITCH TO VIEWER      */
/* ========================= */

function startComic() {
  document.getElementById("hubScreen").style.display = "none";
  document.getElementById("viewerScreen").style.display = "block";
  showPage();
  updateMusicForPage();
  startTimer();
}

/* ========================= */
/*     BACK TO HOME          */
/* ========================= */

document.getElementById("homeBtn").addEventListener("click", function() {
  document.getElementById("viewerScreen").style.display = "none";
  document.getElementById("hubScreen").style.display = "flex";
});

/* ========================= */
/*     PAGE DISPLAY LOGIC    */
/* ========================= */

function showPage() {
  document.getElementById("comic").src = "comicbook2/" + pages[page];
  updateMusicForPage();
}

function nextPage() {
  page = (page + 1) % pages.length;
  showPage();
}

function prevPage() {
  page = (page - 1 + pages.length) % pages.length;
  showPage();
}

/* ========================= */
/*     AUTO-FLIP LOGIC       */
/* ========================= */

var flipSpeed = 6000;
var timer = null;
var autoFlipPaused = false;

function startTimer() {
  if (timer !== null) clearInterval(timer);

  timer = setInterval(function() {
    if (!autoFlipPaused) nextPage();
  }, flipSpeed);
}

var slider = document.getElementById("speedSlider");
slider.addEventListener("input", function() {
  flipSpeed = parseInt(this.value, 10);

  if (flipSpeed === 15000) {
    autoFlipPaused = true;
    clearInterval(timer);
    return;
  }

  autoFlipPaused = false;
  startTimer();
});

/* ========================= */
/*     MANUAL NAVIGATION     */
/* ========================= */

document.getElementById("leftBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  prevPage();
  resumeAutoFlip();
});

document.getElementById("rightBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  nextPage();
  resumeAutoFlip();
});

function resumeAutoFlip() {
  setTimeout(function() {
    if (flipSpeed < 15000) autoFlipPaused = false;
  }, 5000);
}
</script>

</body>
</html>
