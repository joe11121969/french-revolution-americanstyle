<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Comic Viewer</title>

<style>
  body {
    margin: 0;
    background-color: black;
    overflow: hidden;
  }

  #comicImage {
    position: absolute;
    inset: 0;
    margin: auto;
    max-width: 100%;
    max-height: 100%;
  }
</style>
</head>
<body>

<img id="comicImage" src="">

<script>
/* ------------------------------
   PAGE ORDER (ONLY FLIPPING)
--------------------------------*/
var pages = [
  // Chapter 1
  "chapter1/c1p1.png",
  "chapter1/c1p2.png",
  "chapter1/c1p3.png",
  "chapter1/c1p4.png",
  "chapter1/c1p5.png",
  "chapter1/c1p6.png",
  "chapter1/c1p7.png",
  "chapter1/c1p8.png",

  // Chapter 2
  "chapter2/c2p1.png",
  "chapter2/c2p2.png",
  "chapter2/c2p3.png",
  "chapter2/c2p4.png",
  "chapter2/c2p5.png",
  "chapter2/c2p6.png",
  "chapter2/c2p7.png",
  "chapter2/c2p8.png"
];

var page = 0;

/* ------------------------------
   LOAD FIRST PAGE
--------------------------------*/
function loadPage() {
  document.getElementById("comicImage").src = pages[page];
}

/* ------------------------------
   AUTO-FLIP EVERY 5 SECONDS
--------------------------------*/
function startAutoFlip() {
  setInterval(function() {
    page = (page + 1) % pages.length;
    loadPage();
  }, 5000);
}

loadPage();
startAutoFlip();
</script>

</body>
</html>
