<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Episode 1 – Comic</title>

<style>
  body {
    margin: 0;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  img {
    max-width: 100%;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  #speedControl {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
  }

  input[type=range] {
    width: 60%;
  }
</style>
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="comicbook2/Smoke on the Horizon.mp3" type="audio/mpeg">
</audio>

<!-- Comic Page -->
<img id="comic" src="" alt="Comic Page">

<!-- Speed Slider -->
<div id="speedControl">
  <input type="range" id="speedSlider" min="2000" max="15000" value="6000" step="500">
  <div>Flip Speed</div>
</div>

<script>
let page = 0;

// EXACT filenames from your screenshot
let pages = [
  "cover page.png",
  "page 2.png",
  "page 3.png",
  "page 4.png",
  "page 5.png",
  "page 6.png",
  "page 7.png",
  "page 8.png"
];

let flipSpeed = 6000; // default 6 seconds

function showPage() {
  document.getElementById("comic").src = "comicbook2/" + pages[page];
}

function nextPage() {
  page = (page + 1) % pages.length;
  showPage();
}

let timer = setInterval(nextPage, flipSpeed);
showPage();

// Slider to adjust speed
document.getElementById("speedSlider").addEventListener("input", function() {
  flipSpeed = this.value;
  clearInterval(timer);
  timer = setInterval(nextPage, flipSpeed);
});
</script>

</body>
</html>
