<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Episode 1 – Comic</title>

<style>
  body {
    margin: 0;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  img {
    max-width: 100%;
    max-height: 95vh;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  /* Speed slider container */
  #speedControl {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 99999;
  }

  input[type=range] {
    width: 60%;
  }

  /* Left and right triangles */
  .navButton {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 80px;
    color: white;
    cursor: pointer;
    z-index: 999999; /* ← FIX: above everything */
    user-select: none;
    opacity: 0.7;
    padding: 20px; /* ← FIX: bigger click area */
  }

  .navButton:hover {
    opacity: 1;
  }

  #leftBtn {
    left: 20px;
  }

  #rightBtn {
    right: 20px;
  }
</style>
</head>

<body>

<!-- Audio Player (TOP LEFT) -->
<audio controls loop style="position:fixed; top:20px; left:20px; z-index:999999; background:black; padding:5px; border-radius:5px;">
  <source src="comicbook2/Smoke on the Horizon.mp3" type="audio/mpeg">
</audio>

<!-- Manual Navigation Buttons -->
<div id="leftBtn" class="navButton">&#9664;</div>
<div id="rightBtn" class="navButton">&#9654;</div>

<!-- Comic Page -->
<img id="comic" src="" alt="Comic Page">

<!-- Speed Slider (BOTTOM CENTER) -->
<div id="speedControl">
  <input type="range" id="speedSlider" min="2000" max="15000" value="6000" step="500">
  <div>Flip Speed</div>
</div>

<script>
// Old-school JS for maximum compatibility
var page = 0;

// EXACT filenames from your folder
var pages = [
  "cover page.png",
  "page 2.png",
  "page 3.png",
  "page 4.png",
  "page 5.png",
  "page 6.png",
  "page 7.png",
  "page 8.png"
];

var flipSpeed = 6000; // default 6 seconds
var timer = null;
var autoFlipPaused = false;

function showPage() {
  var img = document.getElementById("comic");
  img.src = "comicbook2/" + pages[page];
}

function nextPage() {
  page = (page + 1) % pages.length;
  showPage();
}

function prevPage() {
  page = (page - 1 + pages.length) % pages.length;
  showPage();
}

function startTimer() {
  if (timer !== null) {
    clearInterval(timer);
  }
  timer = setInterval(function() {
    if (!autoFlipPaused) {
      nextPage();
    }
  }, flipSpeed);
}

// Start everything
showPage();
startTimer();

// Slider to adjust speed
var slider = document.getElementById("speedSlider");
slider.addEventListener("input", function() {
  flipSpeed = parseInt(this.value, 10);
  startTimer();
});

// Manual navigation buttons
document.getElementById("leftBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  prevPage();
  resumeAutoFlip();
});

document.getElementById("rightBtn").addEventListener("click", function() {
  autoFlipPaused = true;
  nextPage();
  resumeAutoFlip();
});

// Resume auto-flip after 5 seconds
function resumeAutoFlip() {
  setTimeout(function() {
    autoFlipPaused = false;
  }, 5000);
}
</script>

</body>
</html>
