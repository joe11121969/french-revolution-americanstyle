<!DOCTYPE html>
<html>
<head>
    <title>Comic Viewer</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }

        #comicImage {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: black;
        }

        .navButton {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            cursor: pointer;
            user-select: none;
            z-index: 9999;
        }

        #prevBtn { left: 10px; }
        #nextBtn { right: 10px; }

        #backBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            cursor: pointer;
            user-select: none;
            z-index: 9999;
        }

        /* Music Player */
        #musicPlayer {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 999999;
            width: 200px;
        }

        /* Speed Slider */
        #speedControl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            color: white;
            font-size: 18px;
            text-align: right;
        }
    </style>
</head>
<body>

<!-- ⭐ MUSIC PLAYER -->
<audio id="musicPlayer" controls loop>
    <source id="musicSource" src="music/c1m1.mp3" type="audio/mpeg">
</audio>

<!-- ⭐ BACK BUTTON -->
<div id="backBtn" onclick="window.location.href='index.html'">⟵ Back</div>

<!-- ⭐ NAV BUTTONS -->
<div id="prevBtn" class="navButton" onclick="prevPage()">⟵</div>
<div id="nextBtn" class="navButton" onclick="nextPage()">⟶</div>

<!-- ⭐ COMIC IMAGE -->
<img id="comicImage" src="capter1/c1p1.png">

<!-- ⭐ SPEED SLIDER -->
<div id="speedControl">
    Auto‑Flip Speed<br>
    <input type="range" id="speedSlider" min="1" max="10" value="5">
</div>

<script>
/* -----------------------------------------
   PAGE LIST — CHAPTER 1 + CHAPTER 2
----------------------------------------- */
const pages = [
    "capter1/c1p1.png",
    "capter1/c1p2.png",
    "capter1/c1p3.png",
    "capter1/c1p4.png",
    "capter1/c1p5.png",
    "capter1/c1p6.png",
    "capter1/c1p7.png",
    "capter1/c1p8.png",

    "chapter2/c2p1.png",
    "chapter2/c2p2.png",
    "chapter2/c2p3.png",
    "chapter2/c2p4.png",
    "chapter2/c2p5.png",
    "chapter2/c2p6.png",
    "chapter2/c2p7.png",
    "chapter2/c2p8.png"
];

let currentPage = 0;

/* -----------------------------------------
   MUSIC LOGIC
----------------------------------------- */
let currentChapter = 1;
let userIsPlaying = false;

const musicPlayer = document.getElementById("musicPlayer");
const musicSource = document.getElementById("musicSource");

// Track user play/pause actions
musicPlayer.addEventListener("play", () => {
    userIsPlaying = true;
});

musicPlayer.addEventListener("pause", () => {
    userIsPlaying = false;
});

// Detect chapter based on page index
function updateMusicForPage(pageIndex) {
    let newChapter = (pageIndex < 8) ? 1 : 2;

    if (newChapter !== currentChapter) {
        currentChapter = newChapter;

        // Switch tracks
        if (currentChapter === 1) {
            musicSource.src = "music/c1m1.mp3";
        } else {
            musicSource.src = "music/c2m1.mp3";
        }

        musicPlayer.load();

        // Only resume if user was already listening
        if (userIsPlaying) {
            musicPlayer.play();
        }
    }
}

/* -----------------------------------------
   PAGE FLIP FUNCTIONS + WRAP
----------------------------------------- */
function showPage() {
    document.getElementById("comicImage").src = pages[currentPage];
    updateMusicForPage(currentPage);
}

function nextPage() {
    currentPage++;
    if (currentPage >= pages.length) currentPage = 0; // wrap
    showPage();
}

function prevPage() {
    currentPage--;
    if (currentPage < 0) currentPage = pages.length - 1; // wrap
    showPage();
}

/* -----------------------------------------
   AUTO‑FLIP SYSTEM
----------------------------------------- */
let flipInterval = null;

function startAutoFlip() {
    if (flipInterval) clearInterval(flipInterval);

    const sliderValue = document.getElementById("speedSlider").value;

    // Slider max = STOP auto‑flip
    if (sliderValue == 10) return;

    // Convert slider to seconds:
    // 1 → 8 sec
    // 5 → 4 sec
    // 10 → STOP
    const seconds = 8 - ((sliderValue - 1) * (4 / 4));

    flipInterval = setInterval(nextPage, seconds * 1000);
}

// Update speed when slider moves
document.getElementById("speedSlider").addEventListener("input", startAutoFlip);

// Start auto‑flip immediately
startAutoFlip();

// Initial load
showPage();
</script>

</body>
</html>
